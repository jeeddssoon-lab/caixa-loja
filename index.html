<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Caixa PDV</title>
    <script src="https://cdn.jsdelivr.net/npm/@ericblade/quagga2/dist/quagga.min.js"></script>
    
    <style>
      body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #e9ecef; margin: 0; padding: 10px; display: flex; justify-content: center;}
      .pdv-container { display: flex; gap: 15px; width: 100%; max-width: 1200px; height: 95vh; }
      
      .col-esquerda { flex: 2; background: white; padding: 15px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); display: flex; flex-direction: column; }
      h2 { margin-top: 0; color: #333; border-bottom: 2px solid #0d6efd; padding-bottom: 10px; font-size: 20px; }
      
      .caixa-leitor { display: flex; flex-direction: column; gap: 5px; margin-bottom: 10px; }
      
      .linha-busca { display: flex; gap: 8px; width: 100%; }
      .input-codigo { flex: 1; padding: 15px; font-size: 18px; border: 2px solid #0d6efd; border-radius: 5px; background-color: #f8f9fa; font-weight: bold; box-sizing: border-box;}
      .input-codigo:focus { outline: none; border-color: #198754; background-color: #fff; box-shadow: 0 0 5px rgba(25, 135, 84, 0.5); }
      
      .btn-camera { background: #212529; color: white; border: none; border-radius: 5px; padding: 0 15px; font-size: 24px; cursor: pointer; transition: 0.2s; display: flex; justify-content: center; align-items: center; }
      .btn-camera:hover { background: #495057; }
      
      /* CONTAINER DO VÍDEO AUTOMÁTICO */
      #box-camera { display: none; margin-top: 10px; border: 2px solid #212529; border-radius: 5px; overflow: hidden; position: relative; background: #000; width: 100%; max-width: 500px; height: 300px; margin-left: auto; margin-right: auto; }
      #interactive.viewport { width: 100%; height: 100%; }
      #interactive.viewport video { width: 100%; height: 100%; object-fit: cover; }
      
      /* Linha vermelha guia para ajudar o lojista a mirar */
      .linha-guia { position: absolute; top: 50%; left: 10%; width: 80%; height: 2px; background: red; z-index: 5; box-shadow: 0 0 4px red; }
      
      .btn-fechar-camera { position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%); background: #dc3545; color: white; border: none; padding: 8px 16px; border-radius: 20px; font-weight: bold; cursor: pointer; z-index: 10; box-shadow: 0 2px 5px rgba(0,0,0,0.5);}
      
      .mensagem-caixa { font-size: 13px; font-weight: bold; min-height: 18px; color: #dc3545; }

      #areaResultadosCaixa { display: none; background: #fff; border: 2px solid #198754; border-radius: 5px; max-height: 250px; overflow-y: auto; margin-bottom: 15px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
      .cabecalho-busca { background: #e9ecef; padding: 8px; font-size: 12px; font-weight: bold; text-align: center; border-bottom: 1px solid #ccc; color: #555; }
      .item-resultado { padding: 10px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; cursor: pointer; transition: 0.2s; }
      .item-resultado:hover { background: #f1f8ff; }
      
      .area-tabela { flex: 1; overflow-y: auto; border: 1px solid #ddd; border-radius: 5px; }
      table { width: 100%; border-collapse: collapse; }
      th, td { padding: 10px; text-align: left; border-bottom: 1px solid #ddd; font-size: 14px; }
      th { background-color: #f8f9fa; color: #555; position: sticky; top: 0; }
      .btn-remover { background: #dc3545; color: white; border: none; padding: 6px 10px; border-radius: 4px; cursor: pointer; font-weight: bold; }
      
      .col-direita { flex: 1; background: white; padding: 15px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); display: flex; flex-direction: column; overflow-y: auto; }
      
      .painel-total { background: #212529; color: #00ff00; text-align: right; padding: 15px; border-radius: 8px; margin-bottom: 15px; }
      .titulo-total { font-size: 16px; color: #adb5bd; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 1px; }
      .valor-total { font-size: 38px; font-weight: bold; margin: 0; line-height: 1; }
      
      .secao-pagamento { margin-top: auto; }
      .titulo-pagamento { font-size: 14px; color: #555; font-weight: bold; margin: 0; }
      .grid-pagamento { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; }
      
      .btn-pag { padding: 12px; font-size: 14px; font-weight: bold; border: 2px solid #dee2e6; border-radius: 5px; cursor: pointer; background: #fff; color: #495057; transition: 0.2s; }
      .btn-pag:hover { background: #f8f9fa; }
      .btn-pag.ativo { background: #0d6efd; color: white; border-color: #0d6efd; }

      .caixa-opcoes { display: none; background: #f8f9fa; border: 1px solid #dee2e6; border-radius: 5px; padding: 10px; margin-bottom: 15px; }
      .label-opcao { font-size: 12px; font-weight: bold; color: #555; display: block; margin-bottom: 5px; }
      .input-opcao { width: 100%; padding: 8px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; background: white; font-weight: bold; box-sizing: border-box; }
      
      .linha-troco { display: flex; justify-content: space-between; align-items: center; margin-top: 5px; padding-top: 10px; border-top: 1px dashed #ccc; }
      .titulo-troco { font-weight: bold; color: #555; font-size: 14px; }
      .valor-troco { font-size: 26px; font-weight: bold; color: #dc3545; }
      
      .btn-finalizar { width: 100%; background: #198754; color: white; border: none; padding: 15px; font-size: 18px; font-weight: bold; border-radius: 5px; cursor: pointer; text-transform: uppercase; transition: 0.3s; margin-top: 10px;}
      .btn-finalizar:hover { background: #157347; }
      .btn-finalizar:disabled { background: #6c757d; cursor: not-allowed; }
      
      .lbl-combinada { cursor: pointer; font-size: 13px; font-weight: bold; background: #fff3cd; color: #856404; padding: 6px 12px; border-radius: 5px; border: 1px solid #ffeeba; display: flex; align-items: center; gap: 5px; transition: 0.2s;}
      .lbl-combinada:hover { background: #ffeeba; }
      .lbl-combinada input { cursor: pointer; width: 16px; height: 16px; margin: 0; }
      
      @media (max-width: 768px) {
        body { padding: 5px; background-color: #fff;}
        .pdv-container { flex-direction: column; height: auto; gap: 10px; }
        .area-tabela { max-height: 250px; }
      }
    </style>
  </head>
  <body>
    <div class="pdv-container">
      
      <div class="col-esquerda">
        <h2>🛒 Caixa Aberto</h2>
        
        <div class="caixa-leitor">
          <div class="linha-busca">
            <input type="text" id="codigoBarra" class="input-codigo" placeholder="Bipe o código ou busque pelo nome..." autofocus onkeypress="verificarEnter(event)">
            <button class="btn-camera" onclick="abrirCameraAutomática()" title="Escanear Automaticamente">📷</button>
          </div>
          <div id="msgCaixa" class="mensagem-caixa"></div>
          
          <div id="box-camera">
             <div class="linha-guia"></div>
             <div id="interactive" class="viewport"></div>
             <button class="btn-fechar-camera" onclick="fecharCameraAutomatica()">FECHAR</button>
          </div>
        </div>

        <div id="areaResultadosCaixa"></div>
        
        <div class="area-tabela">
          <table>
            <thead><tr><th>Item</th><th>Vl. Un</th><th>Ação</th></tr></thead>
            <tbody id="listaCarrinho">
              <tr><td colspan="3" style="text-align:center; color:#999; padding: 20px;">Aguardando itens...</td></tr>
            </tbody>
          </table>
        </div>
      </div>

      <div class="col-direita">
        <div class="painel-total">
          <div class="titulo-total">Total a Pagar</div>
          <p class="valor-total" id="txtTotal">R$ 0,00</p>
        </div>
        <div class="secao-pagamento">
          
          <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
            <div class="titulo-pagamento">Forma de Pagamento:</div>
            <label class="lbl-combinada" title="Ative para dividir o pagamento em 2 ou mais formas">
              <input type="checkbox" id="chkMisto" onchange="alternarModoCombinado()"> Compra Combinada ✅
            </label>
          </div>

          <div class="grid-pagamento">
            <button id="pag-dinheiro" class="btn-pag ativo" onclick="togglePagamento('dinheiro')">💵 Dinheiro</button>
            <button id="pag-pix" class="btn-pag" onclick="togglePagamento('pix')">💠 PIX</button>
            <button id="pag-credito" class="btn-pag" onclick="togglePagamento('credito')">💳 Crédito</button>
            <button id="pag-debito" class="btn-pag" onclick="togglePagamento('debito')">💳 Débito</button>
          </div>

          <div id="opcoes-dinheiro-simples" class="caixa-opcoes" style="display: block;">
            <label class="label-opcao">Valor Entregue pelo Cliente (R$):</label>
            <input type="text" id="valorRecebidoSimples" class="input-opcao" placeholder="Ex: 100,00" onkeyup="calcularTrocoSimples()">
            <div class="linha-troco">
              <span class="titulo-troco">Troco a Devolver:</span>
              <span id="txtTrocoSimples" class="valor-troco">R$ 0,00</span>
            </div>
          </div>

          <div id="painel-divisao" class="caixa-opcoes" style="border-color: #ffc107;">
            <div style="font-size:13px; font-weight:bold; color:#856404; margin-bottom:10px;">⚖️ Venda Combinada: Preencha os valores</div>
            <div id="linha-div-dinheiro" style="display:none; padding-bottom:8px; border-bottom:1px solid #ddd; margin-bottom:8px;">
              <label class="label-opcao">💵 Parte em Dinheiro (R$):</label>
              <input type="text" id="div-val-dinheiro" class="input-opcao" onkeyup="calcDivisao()">
              <label class="label-opcao" style="color:#666;">↳ Dinheiro Recebido p/ Troco (R$):</label>
              <input type="text" id="div-rec-dinheiro" class="input-opcao" style="background:#f8f9fa;" onkeyup="calcDivisao()">
              <div style="text-align:right; font-weight:bold; font-size:14px; color:#dc3545;">Troco: <span id="div-troco">R$ 0,00</span></div>
            </div>
            <div id="linha-div-pix" style="display:none;">
              <label class="label-opcao">💠 Parte no PIX (R$):</label>
              <input type="text" id="div-val-pix" class="input-opcao" onkeyup="calcDivisao()">
            </div>
            <div id="linha-div-credito" style="display:none;">
              <label class="label-opcao">💳 Parte no Crédito (R$):</label>
              <input type="text" id="div-val-credito" class="input-opcao" onkeyup="calcDivisao()">
            </div>
            <div id="linha-div-debito" style="display:none;">
              <label class="label-opcao">💳 Parte no Débito (R$):</label>
              <input type="text" id="div-val-debito" class="input-opcao" onkeyup="calcDivisao()">
            </div>
            <div class="linha-troco" style="border-color:#198754; margin-top:10px;">
              <span class="titulo-troco">Falta Distribuir:</span>
              <span id="div-falta" class="valor-troco" style="color:#dc3545;">R$ 0,00</span>
            </div>
          </div>

          <div id="opcoes-cartao" class="caixa-opcoes">
            <label class="label-opcao" style="font-size:14px;">⚙️ Detalhes da Maquininha:</label>
            <label class="label-opcao" style="font-weight:normal; margin-top:5px;">Bandeira:</label>
            <select id="bandeira-cartao" class="input-opcao" style="font-weight:normal;">
              <option value="Visa/Master">Visa / Mastercard</option>
              <option value="Elo">Elo</option>
              <option id="opt-link" value="Link">Link de Pagamento</option>
            </select>
            <div id="div-parcelas">
              <label class="label-opcao" style="font-weight:normal;">Parcelas (Crédito):</label>
              <select id="parcelas-cartao" class="input-opcao" style="font-weight:normal;">
                <option value="1">1x</option><option value="2">2x</option><option value="3">3x</option>
                <option value="4">4x</option><option value="5">5x</option><option value="6">6x</option>
                <option value="7">7x</option><option value="8">8x</option><option value="9">9x</option>
                <option value="10">10x</option><option value="11">11x</option><option value="12">12x</option>
              </select>
            </div>
          </div>

          <button id="btnFinalizarVenda" class="btn-finalizar" onclick="finalizarVenda()">✅ FINALIZAR</button>
        </div>
      </div>

    </div>

    <script>
      // O seu link já está correto aqui
      const URL_GOOGLE = "https://script.google.com/macros/s/AKfycbyhWkf9fuYZUBFrFmn6xqKg9h3nOyXXrTHAG9nqUEKK58Z-389cCA2s7k1LN6jkVCgl/exec"; 
    
      window.carrinho = [];
      window.resultadosAtuais = []; 
      window.formasPagamento = ['dinheiro']; 
      let cameraLigada = false;

      // ============================================
      // CÂMERA DE LEITURA AUTOMÁTICA (MODO PRO - ALTA PERFORMANCE)
      // ============================================
      function abrirCameraAutomática() {
        document.getElementById('box-camera').style.display = 'block';
        if (cameraLigada) return;

        Quagga.init({
          inputStream: {
            name: "Live",
            type: "LiveStream",
            target: document.querySelector('#interactive'),
            constraints: {
              width: { ideal: 1280 }, // Resolução exata que funcionava liso no Netlify
              height: { ideal: 720 }, 
              facingMode: "environment" 
            },
          },
          locator: { 
            patchSize: "medium", 
            halfSample: true 
          },
          numOfWorkers: 4, // Potência máxima habilitada
          decoder: {
            // O SEGREDO ESTAVA AQUI! O formato real da sua Argox é o Code 39!
            readers: ["code_39_reader"]
          },
          locate: true
        }, function(err) {
            if (err) {
                alert("Erro ao ligar o leitor automático: " + err);
                document.getElementById('box-camera').style.display = 'none';
                return;
            }
            Quagga.start();
            cameraLigada = true;
        });

        Quagga.onDetected(function(result) {
            if (result.codeResult && result.codeResult.code) {
                // Limpa os asteriscos se eles aparecerem
                var codigoDetectado = result.codeResult.code.replace(/\*/g, '');
                
                tocarBip();
                fecharCameraAutomatica();
                document.getElementById('codigoBarra').value = codigoDetectado;
                buscarProdutoCaixa(codigoDetectado);
            }
        });
      }

      function fecharCameraAutomatica() {
         if (cameraLigada) { Quagga.stop(); cameraLigada = false; }
         document.getElementById('box-camera').style.display = 'none';
      }

      function tocarBip() {
        try {
          var ctx = new (window.AudioContext || window.webkitAudioContext)();
          var osc = ctx.createOscillator();
          osc.type = 'sine'; osc.frequency.setValueAtTime(800, ctx.currentTime);
          osc.connect(ctx.destination); osc.start(); osc.stop(ctx.currentTime + 0.1);
        } catch(e){}
      }

      function limpaValorHTML(val) {
        if (typeof val === 'number') return val;
        if (!val) return 0;
        var s = String(val).replace('R$', '').trim();
        if (s.indexOf(',') > -1 && s.indexOf('.') > -1) s = s.replace(/\./g, '').replace(',', '.');
        else if (s.indexOf(',') > -1) s = s.replace(',', '.');
        return parseFloat(s) || 0;
      }

      function verificarEnter(evento) {
        if (evento.keyCode === 13) {
          var termoBusca = document.getElementById('codigoBarra').value.trim();
          if (termoBusca !== "") buscarProdutoCaixa(termoBusca);
        }
      }

      function buscarProdutoCaixa(termo) {
        var msgBox = document.getElementById('msgCaixa');
        var areaBusca = document.getElementById('areaResultadosCaixa');
        
        // Mantém a correção para sempre buscar com os asteriscos da Argox
        if (!termo.includes('*') && !isNaN(termo)) {
            termo = "*" + termo + "*";
        }

        msgBox.innerHTML = "Buscando: " + termo + "...";
        msgBox.style.color = "#0d6efd";
        areaBusca.style.display = 'none';

        var tipoBusca = (termo.includes('*') || !isNaN(termo.replace(/\*/g,''))) ? 'codigo' : 'nome';
        
        // A JOGADA DE MESTRE: Envelopar a busca (POST) ao invés de usar URL (GET)
        var pacoteDeBusca = {
            acao: 'buscar',
            termo: termo,
            tipoBusca: tipoBusca
        };

        // Usando o método POST (Igual finalizar a venda). O navegador NUNCA bloqueia isso!
        fetch(URL_GOOGLE, {
            method: 'POST',
            body: JSON.stringify(pacoteDeBusca),
            headers: { "Content-Type": "text/plain;charset=utf-8" }
        })
        .then(response => response.json())
        .then(data => {
            document.getElementById('codigoBarra').value = ""; 
            document.getElementById('codigoBarra').focus(); 
            
            if (data.status === "sucesso" && data.dados && data.dados.length > 0) {
                msgBox.innerHTML = "";
                var resultados = data.dados;
                if (resultados.length === 1 || tipoBusca === 'codigo') {
                    adicionarAoCarrinho(resultados[0]);
                } else {
                    window.resultadosAtuais = resultados;
                    mostrarListaParaEscolha(resultados);
                }
            } else {
                msgBox.innerHTML = "❌ Produto não encontrado no estoque!";
                msgBox.style.color = "#dc3545";
                setTimeout(function(){ msgBox.innerHTML = ""; }, 3000);
            }
        })
        .catch(err => {
            msgBox.innerHTML = "❌ Erro de conexão com a planilha!";
            console.error(err);
        });
      }

      function mostrarListaParaEscolha(resultados) {
        var area = document.getElementById('areaResultadosCaixa');
        var html = '<div class="cabecalho-busca">Múltiplos itens encontrados. Selecione o correto abaixo:</div>';
        
        for (var i = 0; i < resultados.length; i++) {
          var p = resultados[i];
          var temCredito = window.formasPagamento.includes('credito');
          var valorBruto = temCredito ? p.precoParc : p.precoVista;
          var valorReal = limpaValorHTML(valorBruto);
          var valorExibir = "R$ " + valorReal.toFixed(2).replace('.', ',');
          
          html += `
            <div class="item-resultado" onclick="selecionarProdutoCaixa(${i})">
              <div class="info-busca">
                <b style="color:#0d6efd; font-size:16px;">${p.item}</b> (${p.fornecedor})<br>
                Tam: <b>${p.tamanho}</b> | Cód: ${p.codigo} <br>
                <span style="color:#198754; font-weight:bold;">${valorExibir}</span>
              </div>
              <button class="btn-add-lupa">🔍 SELECIONAR</button>
            </div>
          `;
        }
        area.innerHTML = html;
        area.style.display = 'block';
      }

      function selecionarProdutoCaixa(index) {
        document.getElementById('areaResultadosCaixa').style.display = 'none';
        adicionarAoCarrinho(window.resultadosAtuais[index]);
        document.getElementById('codigoBarra').focus();
      }

      function adicionarAoCarrinho(produto) {
        var itemExistente = window.carrinho.find(function(p) { return p.codigo === produto.codigo; });
        if (itemExistente) itemExistente.quantidadeComprada += 1;
        else { produto.quantidadeComprada = 1; window.carrinho.push(produto); }
        atualizarTabelaCaixa();
      }

      function removerDoCarrinho(index) { window.carrinho.splice(index, 1); atualizarTabelaCaixa(); }

      function alternarModoCombinado() {
         var chk = document.getElementById('chkMisto').checked;
         if (!chk && window.formasPagamento.length > 1) { window.formasPagamento = [window.formasPagamento[0]]; }
         aplicarCoresDosBotoes(); atualizarTabelaCaixa();
      }

      function togglePagamento(forma) {
        var chkMisto = document.getElementById('chkMisto').checked;
        if (chkMisto) {
            if (window.formasPagamento.includes(forma)) {
                if (window.formasPagamento.length > 1) { window.formasPagamento = window.formasPagamento.filter(f => f !== forma); }
            } else { window.formasPagamento.push(forma); }
        } else { window.formasPagamento = [forma]; }
        aplicarCoresDosBotoes(); atualizarTabelaCaixa();
      }

      function aplicarCoresDosBotoes() {
        document.getElementById('pag-dinheiro').classList.toggle('ativo', window.formasPagamento.includes('dinheiro'));
        document.getElementById('pag-pix').classList.toggle('ativo', window.formasPagamento.includes('pix'));
        document.getElementById('pag-credito').classList.toggle('ativo', window.formasPagamento.includes('credito'));
        document.getElementById('pag-debito').classList.toggle('ativo', window.formasPagamento.includes('debito'));
      }

      function atualizarTabelaCaixa() {
         var tbody = document.getElementById('listaCarrinho');
         var total = 0;
         if (window.carrinho.length === 0) {
            tbody.innerHTML = '<tr><td colspan="3" style="text-align:center; color:#999; padding: 20px;">Aguardando itens...</td></tr>';
            document.getElementById('txtTotal').innerText = "R$ 0,00";
            renderizarPaineis();
            return;
         }
         var html = '';
         var temCredito = window.formasPagamento.includes('credito');

         for (var i = 0; i < window.carrinho.length; i++) {
            var p = window.carrinho[i];
            var precoBruto = temCredito ? p.precoParc : p.precoVista;
            var preco = limpaValorHTML(precoBruto);
            var subtotal = preco * p.quantidadeComprada;
            total += subtotal;
            var precoFormatado = preco.toFixed(2).replace('.', ',');
            
            html += `<tr>
              <td><b style="color:#0d6efd">${p.quantidadeComprada}x</b> ${p.item} <br><small style="color:#666;">Tam: ${p.tamanho} | Marca: <b>${p.fornecedor}</b></small></td>
              <td><b>R$ ${precoFormatado}</b></td>
              <td><button class="btn-remover" onclick="removerDoCarrinho(${i})">X</button></td>
            </tr>`;
         }
         tbody.innerHTML = html;
         document.getElementById('txtTotal').innerText = "R$ " + total.toFixed(2).replace('.', ',');
         renderizarPaineis();
      }

      function renderizarPaineis() {
        var numFormas = window.formasPagamento.length;
        var pSimples = document.getElementById('opcoes-dinheiro-simples');
        var pCartao = document.getElementById('opcoes-cartao');
        var pDivisao = document.getElementById('painel-divisao');

        pSimples.style.display = 'none'; pCartao.style.display = 'none'; pDivisao.style.display = 'none';

        var temCredito = window.formasPagamento.includes('credito');
        var temDebito = window.formasPagamento.includes('debito');
        var temDinheiro = window.formasPagamento.includes('dinheiro');
        var temPix = window.formasPagamento.includes('pix');

        if (numFormas === 1) {
            if (temDinheiro) { pSimples.style.display = 'block'; calcularTrocoSimples(); }
            if (temCredito || temDebito) {
                pCartao.style.display = 'block';
                document.getElementById('div-parcelas').style.display = temCredito ? 'block' : 'none';
                document.getElementById('opt-link').disabled = temDebito;
            }
        } else {
            pDivisao.style.display = 'block';
            document.getElementById('linha-div-dinheiro').style.display = temDinheiro ? 'block' : 'none';
            document.getElementById('linha-div-pix').style.display = temPix ? 'block' : 'none';
            document.getElementById('linha-div-credito').style.display = temCredito ? 'block' : 'none';
            document.getElementById('linha-div-debito').style.display = temDebito ? 'block' : 'none';
            
            if (temCredito || temDebito) {
                pCartao.style.display = 'block'; 
                document.getElementById('div-parcelas').style.display = temCredito ? 'block' : 'none';
                document.getElementById('opt-link').disabled = (temDebito && !temCredito);
            }
            calcDivisao(); 
        }
      }

      function calcularTrocoSimples() {
         var total = limpaValorHTML(document.getElementById('txtTotal').innerText);
         var recebido = limpaValorHTML(document.getElementById('valorRecebidoSimples').value);
         var troco = recebido - total;
         if (troco < 0 || isNaN(troco) || document.getElementById('valorRecebidoSimples').value === "") troco = 0;
         document.getElementById('txtTrocoSimples').innerText = "R$ " + troco.toFixed(2).replace('.', ',');
      }

      function calcDivisao() {
        var total = limpaValorHTML(document.getElementById('txtTotal').innerText);
        var vDin = window.formasPagamento.includes('dinheiro') ? limpaValorHTML(document.getElementById('div-val-dinheiro').value) : 0;
        var vPix = window.formasPagamento.includes('pix') ? limpaValorHTML(document.getElementById('div-val-pix').value) : 0;
        var vCred = window.formasPagamento.includes('credito') ? limpaValorHTML(document.getElementById('div-val-credito').value) : 0;
        var vDeb = window.formasPagamento.includes('debito') ? limpaValorHTML(document.getElementById('div-val-debito').value) : 0;

        var soma = vDin + vPix + vCred + vDeb;
        var falta = total - soma;
        
        var elFalta = document.getElementById('div-falta');
        if (falta > 0.01) { elFalta.innerText = "Faltam R$ " + falta.toFixed(2).replace('.', ','); elFalta.style.color = "#dc3545"; } 
        else if (falta < -0.01) { elFalta.innerText = "Passou R$ " + Math.abs(falta).toFixed(2).replace('.', ','); elFalta.style.color = "#dc3545"; } 
        else { elFalta.innerText = "R$ 0,00 (Perfeito!)"; elFalta.style.color = "#198754"; }

        if (window.formasPagamento.includes('dinheiro')) {
            var recebido = limpaValorHTML(document.getElementById('div-rec-dinheiro').value);
            var troco = recebido - vDin; 
            if (troco < 0 || isNaN(troco) || document.getElementById('div-rec-dinheiro').value === "") troco = 0;
            document.getElementById('div-troco').innerText = "R$ " + troco.toFixed(2).replace('.', ',');
        }
      }

      function finalizarVenda() {
        if (window.carrinho.length === 0) { alert("Atenção: Adicione produtos ao carrinho!"); return; }
        
        var total = limpaValorHTML(document.getElementById('txtTotal').innerText);
        var pagamentosParaEnviar = [];
        var bandeira = document.getElementById('bandeira-cartao').value;
        var parcelas = document.getElementById('parcelas-cartao').value;

        if (window.formasPagamento.length === 1) {
            pagamentosParaEnviar.push({ forma: window.formasPagamento[0], valor: total, bandeira: bandeira, parcelas: parcelas });
        } else {
            var vDin = window.formasPagamento.includes('dinheiro') ? limpaValorHTML(document.getElementById('div-val-dinheiro').value) : 0;
            var vPix = window.formasPagamento.includes('pix') ? limpaValorHTML(document.getElementById('div-val-pix').value) : 0;
            var vCred = window.formasPagamento.includes('credito') ? limpaValorHTML(document.getElementById('div-val-credito').value) : 0;
            var vDeb = window.formasPagamento.includes('debito') ? limpaValorHTML(document.getElementById('div-val-debito').value) : 0;
            var soma = vDin + vPix + vCred + vDeb;
            
            if (Math.abs(soma - total) > 0.01) { alert("ERRO: A soma dos valores não bate com o Total da Venda."); return; }

            if (vDin > 0) pagamentosParaEnviar.push({ forma: 'dinheiro', valor: vDin });
            if (vPix > 0) pagamentosParaEnviar.push({ forma: 'pix', valor: vPix });
            if (vCred > 0) pagamentosParaEnviar.push({ forma: 'credito', valor: vCred, bandeira: bandeira, parcelas: parcelas });
            if (vDeb > 0) pagamentosParaEnviar.push({ forma: 'debito', valor: vDeb, bandeira: bandeira });
        }

        var btn = document.getElementById('btnFinalizarVenda');
        btn.innerHTML = "⏳ REGISTRANDO..."; btn.disabled = true;

        var payload = { acao: 'vender', venda: { carrinho: window.carrinho, pagamentos: pagamentosParaEnviar, totalStr: document.getElementById('txtTotal').innerText } };

        fetch(URL_GOOGLE, {
            method: 'POST',
            body: JSON.stringify(payload)
        })
        .then(response => response.json())
        .then(data => {
          btn.innerHTML = "✅ FINALIZAR"; btn.disabled = false;
          if (data.status === "Sucesso") {
            alert("Venda registrada com sucesso!");
            window.carrinho = [];
            document.getElementById('valorRecebidoSimples').value = ''; document.getElementById('div-val-dinheiro').value = ''; document.getElementById('div-val-pix').value = ''; document.getElementById('div-val-credito').value = ''; document.getElementById('div-val-debito').value = ''; document.getElementById('div-rec-dinheiro').value = '';
            document.getElementById('chkMisto').checked = false;
            window.formasPagamento = ['dinheiro'];
            aplicarCoresDosBotoes(); atualizarTabelaCaixa();
            document.getElementById('codigoBarra').focus();
          } else { alert(data.status); }
        })
        .catch(err => {
            btn.innerHTML = "✅ FINALIZAR"; btn.disabled = false;
            alert("Erro de conexão ao registrar venda!");
        });
      }
    </script>
  </body>
</html>
